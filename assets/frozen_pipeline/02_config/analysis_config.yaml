    - "distance_m"
    - "load_condition"
    - "ground_condition"
    - "block_id"
    - "sample_index"
    - "time_unit"
    - "voltage_unit"
    - "start_time_s"
    - "time_increment_s"
    - "sampling_rate_Hz"
    - "record_length"
    - "baseline_V"
    - "nan_fraction"
    - "Apk"
    - "Amin"
    - "App"
