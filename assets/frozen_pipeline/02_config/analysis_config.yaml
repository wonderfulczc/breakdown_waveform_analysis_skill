    - "feature_extract_failed"
    - "fit_failed"
    - "classification_failed"
    - "metadata_conflict"
    - "undefined_group"

# ----------------------------------------------------------------------
# 23. Config snapshot and report
# ----------------------------------------------------------------------

config_snapshot:
  enabled: true

  copy_files:
    - source: "02_config/analysis_config.yaml"
      target: "config_snapshot/analysis_config_used.yaml"
    - source: "02_config/classification_rules.yaml"
      target: "config_snapshot/classification_rules_used.yaml"
    - source: "02_config/plot_style_origin.yaml"
      target: "config_snapshot/plot_style_origin_used.yaml"

  write_config_snapshot_csv: true

report:
  quick_report_enabled: true
  quick_report_pdf_enabled: true
  if_pdf_export_unavailable: "skip_and_warn"

reproducibility:
  save_python_version: true
  save_package_versions: true
  save_command_line: true
  save_run_time: true
  save_git_hash_if_available: true

# ----------------------------------------------------------------------
# 25. distance_S001_comparison
# ----------------------------------------------------------------------

distance_S001_comparison:
  enabled: true

  # ------------------------------------------------------------
  # Plot type 1:
  # same config_group, multiple distances, select S001 for each distance
  # ------------------------------------------------------------
  same_config_multi_distance:
    enabled: true
    trigger_min_distances: 2

    group_by:
      - "date"
      - "config_group"
      - "load_condition"
      - "ground_condition"

    fixed_sample_index: "S001"

    include_only:
      included_equals: 1
      parse_status_equals: "success"

    per_distance_selection:
      preferred_block_id: "B01"
      selection_rule_if_multiple_matches: "smallest_block_id_then_lexicographically_smallest_file_name"
      if_S001_missing_in_distance: "skip_that_distance_and_log"

    distance_sort_order_m:
      - 0.1
      - 0.3
      - 0.6
      - 0.8

    waveform_source: "normalized_waveform"
    plot_types:
      - "time_domain_overlay"
      - "frequency_domain_overlay"

    alignment:
      enabled: true
      method: "peak_time"
      reference_field: "t_Apk_s"
      max_shift_s: 5.0e-8

    legend:
      enabled: true
      label_mode: "full_waveform_name_without_date"
      label_format: "{file_id}"

    annotation:
      enabled: true

    output:
      output_dir: "group_summary/distance_S001_comparison"
      index_csv: "group_summary/distance_S001_comparison/distance_S001_comparison_index.csv"
      filename_pattern_time: "{date}_{config_group}_{load_condition}_{ground_condition}_S001_distance_compare_time"
      filename_pattern_frequency: "{date}_{config_group}_{load_condition}_{ground_condition}_S001_distance_compare_freq"

    status_values:
      - "success"
      - "insufficient_distances"
      - "missing_S001"
      - "selection_conflict"

  # ------------------------------------------------------------
  # Plot type 2:
  # multiple config_group values, choose the minimum available distance
  # for each config_group, then compare their S001 waveforms
  # ------------------------------------------------------------
  cross_config_min_distance:
    enabled: true
    trigger_min_configs: 2

    group_by:
      - "date"
      - "load_condition"
      - "ground_condition"

    fixed_sample_index: "S001"

    include_only:
      included_equals: 1
      parse_status_equals: "success"

    config_groups_order:
      - "G1"
      - "G2"
      - "G3"
      - "G4"

    min_distance_priority_m:
      - 0.1
      - 0.3
      - 0.6
      - 0.8

    per_config_selection:
      choose_rule: "smallest_available_distance_with_valid_S001"
      preferred_block_id: "B01"
      selection_rule_if_multiple_matches: "smallest_block_id_then_lexicographically_smallest_file_name"
      if_no_valid_S001_for_config: "skip_that_config_and_log"

    waveform_source: "normalized_waveform"
    plot_types:
      - "time_domain_overlay"
      - "frequency_domain_overlay"

    alignment:
      enabled: true
      method: "peak_time"
      reference_field: "t_Apk_s"
      max_shift_s: 5.0e-8

    legend:
      enabled: true
      label_mode: "full_waveform_name_without_date"
      label_format: "{file_id}"

    annotation:
      enabled: true

    output:
      output_dir: "group_summary/config_min_distance_S001_comparison"
      index_csv: "group_summary/config_min_distance_S001_comparison/config_min_distance_S001_comparison_index.csv"
      filename_pattern_time: "{date}_{load_condition}_{ground_condition}_config_min_distance_S001_compare_time"
      filename_pattern_frequency: "{date}_{load_condition}_{ground_condition}_config_min_distance_S001_compare_freq"

    status_values:
      - "success"
      - "insufficient_configs"
      - "missing_S001"
      - "selection_conflict"

  # ------------------------------------------------------------
  # Plot type 3:
  # multiple config_group values at the same distance, compare S001 waveforms
  # ------------------------------------------------------------
  cross_config_same_distance:
    enabled: true
    trigger_min_configs: 2

    group_by:
      - "date"
      - "distance_m"

    fixed_sample_index: "S001"

    include_only:
      included_equals: 1
      parse_status_equals: "success"

    config_groups_order:
      - "G1"
      - "G2"
      - "G3"
      - "G4"

    per_config_selection:
      preferred_block_id: "B01"
      selection_rule_if_multiple_matches: "smallest_block_id_then_lexicographically_smallest_file_name"
      if_no_valid_S001_for_config: "skip_that_config_and_log"

    waveform_source: "normalized_waveform"
    plot_types:
      - "time_domain_overlay"
      - "frequency_domain_overlay"

    alignment:
      enabled: true
      method: "peak_time"
      reference_field: "t_Apk_s"
      max_shift_s: 5.0e-8

    legend:
      enabled: true
      label_mode: "full_waveform_name_without_date"
      label_format: "{file_id}"

    annotation:
      enabled: true

    output:
      output_dir: "group_summary/config_same_distance_S001_comparison"
      index_csv: "group_summary/config_same_distance_S001_comparison/config_same_distance_S001_comparison_index.csv"
      filename_pattern_time: "{date}_{distance_token}_config_same_distance_S001_compare_time"
      filename_pattern_frequency: "{date}_{distance_token}_config_same_distance_S001_compare_freq"

    status_values:
      - "success"
      - "insufficient_configs"
      - "missing_S001"
      - "selection_conflict"

