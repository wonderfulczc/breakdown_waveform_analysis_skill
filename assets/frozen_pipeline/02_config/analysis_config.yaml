# 26. Smoke test
# ----------------------------------------------------------------------

smoke_test:
  enabled: true
  run_before_full_analysis: true
  max_files: 5
  required_checks:
    - "yaml_parse_ok"
    - "group_definition_read_ok"
    - "raw_files_scan_ok"
    - "format_detection_ok"
    - "normalization_ok"
    - "feature_extraction_ok"
    - "classification_ok"
    - "single_time_figure_export_ok"
    - "single_frequency_figure_export_ok"
    - "required_csv_columns_ok"

