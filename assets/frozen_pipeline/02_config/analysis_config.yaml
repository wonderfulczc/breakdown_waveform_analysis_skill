    - "f1_MHz"
    - "A1"
    - "f2_MHz"
    - "A2"
    - "PSR_dB"
    - "narrowband_SNR_dB"
    - "alpha"
    - "rho"
    - "fit_R2"
    - "burst_start_s"
    - "burst_end_s"
    - "num_bursts"
    - "single_burst"
    - "envelope_monotonic"
    - "front_glitch_flag"
    - "tail_disturbance_flag"
    - "reignition_flag"
    - "multiburst_flag"
    - "overdamped_flag"
    - "nonoscillatory_flag"
    - "clipped"
    - "saturated"
    - "aliasing_flag"
    - "overdrive_recovery_flag"
    - "echo_flag"
    - "delayed_echo_detected"
    - "multi_peak_flag"
    - "beating_flag"
    - "period_drift_flag"
    - "f2_relation"
    - "fsrc_MHz"
    - "A_fsrc"
