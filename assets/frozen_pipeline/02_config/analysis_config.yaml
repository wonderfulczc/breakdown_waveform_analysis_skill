    - "waveform_format_parse_failed"
    - "csv_read_failed"
    - "feature_extract_failed"
    - "fit_failed"
    - "classification_failed"
    - "excel_export_status"
    - "figure_export_status"

error_handling:
  continue_on_single_file_error: true
  write_error_files_csv: true
  write_excluded_files_csv: true

  error_status_values:
    - "filename_parse_failed"
    - "waveform_format_parse_failed"
    - "csv_read_failed"
