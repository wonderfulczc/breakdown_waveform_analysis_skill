# ----------------------------------------------------------------------
# 20. Statistics
# ----------------------------------------------------------------------

statistics:
  enabled: true

  group_by:
    - "group_id"

  include_only:
    included_equals: 1

  formal_statistics_inclusion_source: "classification_rules.yaml"

  central_tendency:
    primary: "median"
    secondary:
      - "mean"

  IQR:
    enabled: true
    definition: "Q3-Q1"

  CV:
    enabled: true
    definition: "sample_std/mean*100"
    ddof: 1
    if_mean_abs_below: 1.0e-12
    output_if_invalid: "NaN"

  ratios:
    denominator: "N_total"
    output_unit: "percent"

  statistics_fields:
    - "f1_MHz"
    - "alpha"
    - "Apk"
    - "PSR_dB"
    - "narrowband_SNR_dB"
    - "rho"
    - "fit_R2"

  optional_bootstrap_CI:
    enabled: false
    n_bootstrap: 2000
    confidence_level: 0.95
    random_seed: 20260428

  group_decision_source: "classification_rules.yaml"

# ----------------------------------------------------------------------
# 21. Output
# ----------------------------------------------------------------------

output:
  save_csv: true
  save_excel: true
  save_figures: true
  save_logs: true
  save_report: true

  figure_formats:
    - "png"

  csv_float_format: "%.10g"
  excel_float_format: "0.000000"

  normalized_waveform_dir: "normalized_waveform/normalized_csv"
  format_detection_summary_csv: "normalized_waveform/format_detection_summary.csv"

  single_waveform_features_csv: "single_waveform/single_waveform_features.csv"
  single_waveform_labels_csv: "single_waveform/single_waveform_labels.csv"
  group_statistics_csv: "group_summary/group_statistics.csv"
  group_quality_summary_csv: "group_summary/group_quality_summary.csv"
  config_snapshot_csv: "config_snapshot/config_snapshot.csv"
  error_files_csv: "logs/error_files.csv"
  excluded_files_csv: "logs/excluded_files.csv"
  excel_summary_xlsx: "excel_report/waveform_analysis_summary.xlsx"
  quick_report_md: "report/quick_report.md"
  quick_report_pdf: "report/quick_report.pdf"

excel:
  enabled: true
  workbook_name: "waveform_analysis_summary.xlsx"

  sheets:
    README: "auto_generated"
    sample_index: "01_metadata/sample_index.csv"
    format_detection_summary: "normalized_waveform/format_detection_summary.csv"
    single_waveform_features: "single_waveform/single_waveform_features.csv"
    single_waveform_labels: "single_waveform/single_waveform_labels.csv"
    group_statistics: "group_summary/group_statistics.csv"
    group_quality_summary: "group_summary/group_quality_summary.csv"
    error_files: "logs/error_files.csv"
    excluded_files: "logs/excluded_files.csv"
    config_snapshot: "config_snapshot/config_snapshot.csv"

  freeze_header: true
  autofilter: true
  auto_adjust_column_width: true

# ----------------------------------------------------------------------
# 22. Logging and errors
# ----------------------------------------------------------------------

logging:
  enabled: true
  log_file: "logs/run.log"
  log_level: "INFO"

  must_log:
    - "run_id"
    - "start_time"
    - "end_time"
    - "python_version"
    - "package_versions"
    - "command_line"
